---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: renovate

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        default: "false"
        required: false
      logLevel:
        description: Log Level
        default: debug
        required: false
      version:
        description: Renovate version
        default: latest
        required: false
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  push:
    branches: ["main", "renovate*"]
    paths:
      - .github/renovate.json5
      - .github/renovate/**.json5
      - .github/renovate-entrypoint.sh

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  LOG_LEVEL: "${{ inputs.logLevel || 'info' }}"
  RENOVATE_AUTODISCOVER: true
  RENOVATE_AUTODISCOVER_FILTER: "${{ github.repository }}"
  RENOVATE_DRY_RUN: "${{ inputs.dryRun == 'true' }}"
  RENOVATE_PLATFORM: github
  RENOVATE_PLATFORM_COMMIT: true
  # Allow postUpgradeTasks to invoke `dagger develop` so go.sum stays in sync
  # after the customManager bumps a Dagger-module dep.
  RENOVATE_ALLOWED_COMMANDS: '["^find ci -name go.mod -execdir dagger develop"]'
  WORKFLOW_RENOVATE_VERSION: "${{ inputs.version || 'latest' }}"

jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: read
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write
          permission-vulnerability-alerts: read

      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: "${{ steps.app-token.outputs.token }}"
          persist-credentials: false

      - name: Renovate
        uses: renovatebot/github-action@v46.1.15
        with:
          docker-cmd-file: .github/renovate-entrypoint.sh
          docker-user: root
          mount-docker-socket: true
          # Mount the runner's repo checkout into the container so the
          # entrypoint can read dagger.json. /tmp:/tmp is the action's
          # default and must be preserved when overriding this input.
          docker-volumes: "/tmp:/tmp;${{ github.workspace }}:/workspace:ro"
          configurationFile: .github/renovate.json5
          token: "${{ steps.app-token.outputs.token }}"
          renovate-version: "${{ env.WORKFLOW_RENOVATE_VERSION }}"
